section_name: "산업 현황 및 분석"
common_structure:
  - 산업 정의 및 범위 설명
  - 시장 성장 배경
  - 고객 수요 또는 문제 상황
  - 경쟁환경 및 주요 플레이어
  - 투자대상기업에게 주는 기회
  - 리스크 또는 검토 필요사항
writing_tone:
  - 과도하게 확정적인 표현은 피한다
  - "~로 판단됨", "~로 예상됨", "~로 해석됨"과 같은 투자검토 보고서식 표현을 사용한다
  - 수치가 있을 경우 시장규모, 성장률, 출처를 함께 제시한다
  - 마지막 문단에서는 산업 변화가 투자대상기업의 기회 또는 리스크와 어떻게 연결되는지 설명한다
avoid:
  - 근거 없는 시장 전망
  - 제품 홍보성 문장
  - 너무 기술 세부사항에 치우친 설명
  - 출처 없는 수치
