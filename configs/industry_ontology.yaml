include_when:
  - 시장규모 또는 성장률에 대한 근거가 문서에 존재할 때
  - 산업 트렌드가 투자대상기업의 기회와 직접 연결될 때
  - 경쟁환경이 투자대상기업의 포지셔닝 설명에 필요할 때
exclude_when:
  - 투자대상기업 제품 홍보에만 해당하고 산업 설명이 아닐 때
  - 근거가 없는 시장 전망일 때
  - 동일한 내용이 반복될 때
