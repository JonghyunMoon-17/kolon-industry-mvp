rules:
  - id: market_size_evidence
    description: 시장규모 또는 성장률 수치가 있다면 반드시 출처가 있어야 함
    severity: high
  - id: growth_driver_required
    description: 성장요인은 최소 2개 이상 있어야 함
    severity: medium
  - id: competition_required
    description: 경쟁환경 또는 주요 경쟁사 정보가 있어야 함
    severity: medium
  - id: opportunity_link_required
    description: 산업 변화가 투자대상기업의 기회와 연결되어야 함
    severity: high
  - id: risk_required
    description: 산업/시장 관점의 리스크 또는 검토 필요사항이 최소 1개 이상 있어야 함
    severity: medium
  - id: no_unsupported_claim
    description: 출처 없는 시장 전망 또는 과장 표현은 경고
    severity: high
